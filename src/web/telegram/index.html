<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="formal-ai-version" content="__FORMAL_AI_VERSION__" />
    <meta
      name="description"
      content="Run the formal-ai Telegram bot. Install the CLI with cargo install formal-ai or the one-line universal installer, set TELEGRAM_BOT_TOKEN, then run formal-ai telegram in long-polling mode (webhook mode is opt-in)."
    />
    <!-- Self-contained chooser page; same strict same-origin CSP as / and /docs/. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data:; script-src 'self'; style-src 'self'; base-uri 'self'; form-action 'self';"
    />
    <title>formal-ai Telegram bot</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="../landing.css?v=__FORMAL_AI_ASSET_VERSION__" />
  </head>
  <body>
    <main id="telegram-app" class="page-shell" data-testid="telegram-app">
      <noscript>
        <section class="hero">
          <h1>formal-ai Telegram bot</h1>
          <p class="summary">
            The symbolic agent as a Telegram bot, driven by the formal-ai CLI.
          </p>
          <ul>
            <li>
              Install the CLI: <code>cargo install formal-ai</code>
            </li>
            <li>
              One-line installer (macOS/Linux):
              <code
                >curl -fsSL
                https://raw.githubusercontent.com/link-assistant/formal-ai/main/scripts/install.sh
                | sh -s -- cli</code
              >
            </li>
            <li>
              Create a bot with @BotFather, then run
              <code>TELEGRAM_BOT_TOKEN=&lt;token&gt; formal-ai telegram</code>.
            </li>
            <li><a href="../download/">All downloads</a></li>
          </ul>
        </section>
      </noscript>
    </main>

    <script src="../preferences.js?v=__FORMAL_AI_ASSET_VERSION__"></script>
    <script src="../site-chrome.js?v=__FORMAL_AI_ASSET_VERSION__"></script>
    <script src="telegram.js?v=__FORMAL_AI_ASSET_VERSION__"></script>
  </body>
</html>
