name: Learning cycle (proposal only)

# Issue #701 §5: the auto-learning loop must run *periodically*, in proposal
# mode, honouring the human gate. This workflow replays the recorded learning
# frontier on a schedule and publishes the proposals as an artifact; it never
# writes a seed file, never opens a pull request, and never adopts anything.
# Adoption stays with the human-gated issue-#656 promotion protocol.

on:
  schedule:
    # Daily, off-peak. The run is deterministic and offline, so the schedule
    # only decides *when* a human is handed a fresh proposal set.
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: learning-cycle
  cancel-in-progress: false

jobs:
  cycle:
    name: Replay the recorded frontier in proposal mode
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run one learning cycle
        run: |
          set -euo pipefail
          mkdir -p learning-cycle
          cargo run --release --bin formal-ai -- \
            learn cycle --frontier google-trends --dry-run \
            > learning-cycle/run.lino 2> learning-cycle/run.log
          cargo run --release --bin formal-ai -- \
            learn cycle --frontier google-trends --dry-run --proposals \
            > learning-cycle/proposals.lino 2>> learning-cycle/run.log
          cat learning-cycle/run.log

      - name: Assert the run stayed proposal-only and human-gated
        run: |
          set -euo pipefail
          grep -q 'mode "proposal_only"' learning-cycle/run.lino
          grep -q 'human_gated "true"' learning-cycle/run.lino
          # A cycle that stops proposing anything is a regression in the loop,
          # not a quiet success — fail loudly rather than publish an empty set.
          grep -q 'promotion_proposal' learning-cycle/proposals.lino
          # Nothing may be written into the tracked seed by the cycle itself.
          git diff --exit-code -- data/seed

      - name: Publish the proposals for human review
        uses: actions/upload-artifact@v4
        with:
          name: learning-cycle-proposals
          path: learning-cycle/
          retention-days: 30
